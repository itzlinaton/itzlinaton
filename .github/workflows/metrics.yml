name: Metrics

on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: itzlinaton
          template: classic

          base: header, activity, community, repositories, metadata
          config_display: columns
          config_timezone: Europe/Warsaw

          config_order: base.header, isocalendar, people, languages, activity, repositories, achievements

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following

          plugin_languages: yes
          plugin_languages_limit: 12
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size

          plugin_activity: yes
          plugin_activity_days: 30
          plugin_activity_filter: all

          plugin_repositories: yes
          plugin_repositories_affiliations: owner

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
